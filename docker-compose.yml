version: '3.8'

services:
  horizon:
    image: ghcr.io/always1ov/horizon:latest
    # Uncomment the line below to build locally instead of pulling
    # build: .
    container_name: horizon
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    # Run daily at 8:00 AM UTC (adjust as needed)
    # For one-time run, use: docker-compose run --rm horizon
    command: ["--hours", "24"]
